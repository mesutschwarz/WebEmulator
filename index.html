<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Game Boy</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #d6d6d6;
      --muted: #9a9a9a;
      --btn: #121212;
      --btn-border: #2a2a2a;
      --btn-active: #1f1f1f;
      --accent: #e8e8e8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 760px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .screen-wrap {
      border: 1px solid #202020;
      background: #000;
      padding: 10px;
    }

    .screen-wrap:fullscreen {
      width: 100vw;
      height: 100vh;
      border: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    canvas {
      width: 480px;
      height: 432px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button,
    select {
      background: var(--btn);
      color: var(--fg);
      border: 1px solid var(--btn-border);
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1;
    }

    button:hover,
    select:hover {
      background: var(--btn-active);
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .status {
      display: none;
      color: #ff7b7b;
      font-size: 12px;
      text-align: center;
      min-height: 0;
    }

    .status.visible {
      display: block;
    }

    .key-hint {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.45;
    }

    .key-pair {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--btn-border);
      background: #0b0b0b;
    }

    .key {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid #3a3a3a;
      background: #111;
      color: var(--fg);
      font-size: 11px;
      line-height: 1.2;
    }

    @media (max-width: 560px) {
      canvas {
        width: 320px;
        height: 288px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="screenWrap" class="screen-wrap">
      <canvas id="screen" width="160" height="144">No Canvas Support</canvas>
    </div>

    <div class="controls">
      <button data-scale="2">2x</button>
      <button data-scale="3" class="active">3x</button>
      <button data-scale="4">4x</button>

      <select id="paletteSelect" aria-label="Palette">
        <option value="79">Pocket Green</option>
        <option value="0">Gray 1</option>
        <option value="16">Gray 2</option>
        <option value="32">Warm</option>
        <option value="64">Cool</option>
      </select>

      <button id="pauseBtn">Pause</button>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="key-hint" aria-label="Keyboard controls">
      <span class="key-pair"><span class="key">Arrow Keys</span> Move</span>
      <span class="key-pair"><span class="key">Z</span> B</span>
      <span class="key-pair"><span class="key">X</span> A</span>
      <span class="key-pair"><span class="key">Tab</span> Select</span>
      <span class="key-pair"><span class="key">Enter</span> Start</span>
    </div>

    <div id="status" class="status"></div>
  </main>

  <script src="binjgb.js"></script>
  <script>
    "use strict";

    const ROM_PATH = "gameboy.gb";
    const STORAGE_PREFIX = "binjgb:min";
    const DEFAULT_SCALE = 3;
    const CGB_COLOR_CURVE = 2;
    const AUDIO_FRAMES = 4096;
    const AUDIO_LATENCY_SEC = 0.1;
    const MAX_UPDATE_SEC = 5 / 60;
    const CPU_TICKS_PER_SECOND = 4194304;
    const EVENT_NEW_FRAME = 1;
    const EVENT_AUDIO_BUFFER_FULL = 2;
    const EVENT_UNTIL_TICKS = 4;

    const canvas = document.getElementById("screen");
    const screenWrap = document.getElementById("screenWrap");
    const statusEl = document.getElementById("status");
    const paletteSelect = document.getElementById("paletteSelect");
    const pauseBtn = document.getElementById("pauseBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const resetBtn = document.getElementById("resetBtn");
    const scaleButtons = Array.from(document.querySelectorAll("button[data-scale]"));

    let romBuffer = null;
    let emu = null;
    let paused = false;
    let selectedScale = DEFAULT_SCALE;

    function setCriticalStatus(text) {
      statusEl.textContent = text;
      statusEl.classList.add("visible");
    }

    function clearCriticalStatus() {
      statusEl.textContent = "";
      statusEl.classList.remove("visible");
    }

    function key(name) {
      return STORAGE_PREFIX + ":" + name;
    }

    function readArray(name) {
      try {
        const value = localStorage.getItem(key(name));
        if (!value) return null;
        return new Uint8Array(JSON.parse(value));
      } catch (error) {
        return null;
      }
    }

    function writeArray(name, value) {
      try {
        localStorage.setItem(key(name), JSON.stringify(Array.from(value)));
      } catch (error) {
      }
    }

    function makeWasmBuffer(module, ptr, size) {
      return new Uint8Array(module.HEAP8.buffer, ptr, size);
    }

    class EmuAudio {
      constructor(module, emulatorPtr) {
        this.module = module;
        this.started = false;
        this.startSec = 0;
        this.buffer = makeWasmBuffer(
          this.module,
          this.module._get_audio_buffer_ptr(emulatorPtr),
          this.module._get_audio_buffer_capacity(emulatorPtr)
        );

        this.boundUnlock = this.unlock.bind(this);
        window.addEventListener("keydown", this.boundUnlock, true);
        window.addEventListener("click", this.boundUnlock, true);
        window.addEventListener("touchend", this.boundUnlock, true);
      }

      unlock() {
        this.started = true;
        EmuAudio.ctx.resume();
        window.removeEventListener("keydown", this.boundUnlock, true);
        window.removeEventListener("click", this.boundUnlock, true);
        window.removeEventListener("touchend", this.boundUnlock, true);
      }

      pushBuffer() {
        if (!this.started) return;
        const nowSec = EmuAudio.ctx.currentTime;
        const nowPlusLatency = nowSec + AUDIO_LATENCY_SEC;
        this.startSec = this.startSec || nowPlusLatency;

        if (this.startSec < nowSec) {
          this.startSec = nowPlusLatency;
          return;
        }

        const sampleRate = EmuAudio.ctx.sampleRate;
        const buffer = EmuAudio.ctx.createBuffer(2, AUDIO_FRAMES, sampleRate);
        const left = buffer.getChannelData(0);
        const right = buffer.getChannelData(1);

        for (let i = 0; i < AUDIO_FRAMES; i++) {
          left[i] = this.buffer[2 * i] / 255;
          right[i] = this.buffer[2 * i + 1] / 255;
        }

        const source = EmuAudio.ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(EmuAudio.ctx.destination);
        source.start(this.startSec);
        this.startSec += AUDIO_FRAMES / sampleRate;
      }

      suspend() {
        EmuAudio.ctx.suspend();
      }

      resume() {
        if (this.started) EmuAudio.ctx.resume();
      }

      destroy() {
        window.removeEventListener("keydown", this.boundUnlock, true);
        window.removeEventListener("click", this.boundUnlock, true);
        window.removeEventListener("touchend", this.boundUnlock, true);
      }
    }

    EmuAudio.ctx = new (window.AudioContext || window.webkitAudioContext)();

    class EmuVideo {
      constructor(module, emulatorPtr, canvasEl) {
        this.ctx = canvasEl.getContext("2d");
        this.imageData = this.ctx.createImageData(canvasEl.width, canvasEl.height);
        this.buffer = makeWasmBuffer(
          module,
          module._get_frame_buffer_ptr(emulatorPtr),
          module._get_frame_buffer_size(emulatorPtr)
        );
      }

      draw() {
        this.imageData.data.set(this.buffer);
        this.ctx.putImageData(this.imageData, 0, 0);
      }
    }

    class Emulator {
      constructor(module, romArrayBuffer, extRamArrayBuffer) {
        this.module = module;
        const size = (romArrayBuffer.byteLength + 0x7fff) & ~0x7fff;
        this.romDataPtr = this.module._malloc(size);
        makeWasmBuffer(this.module, this.romDataPtr, size)
          .fill(0)
          .set(new Uint8Array(romArrayBuffer));

        this.e = this.module._emulator_new_simple(
          this.romDataPtr,
          size,
          EmuAudio.ctx.sampleRate,
          AUDIO_FRAMES,
          CGB_COLOR_CURVE
        );

        if (this.e === 0) {
          throw new Error("ROM acilamadi");
        }

        this.audio = new EmuAudio(this.module, this.e);
        this.video = new EmuVideo(this.module, this.e, canvas);
        this.lastRafSec = 0;
        this.leftoverTicks = 0;
        this.rafToken = null;

        if (extRamArrayBuffer && extRamArrayBuffer.byteLength > 0) {
          this.loadExtRam(extRamArrayBuffer);
        }

        this.bindKeys();
      }

      get ticks() {
        return this.module._emulator_get_ticks_f64(this.e);
      }

      setPalette(paletteId) {
        this.module._emulator_set_builtin_palette(this.e, paletteId);
      }

      withNewFileData(fileDataPtr, callback) {
        const buffer = makeWasmBuffer(
          this.module,
          this.module._get_file_data_ptr(fileDataPtr),
          this.module._get_file_data_size(fileDataPtr)
        );
        const result = callback(fileDataPtr, buffer);
        this.module._file_data_delete(fileDataPtr);
        return result;
      }

      withNewExtRamFileData(callback) {
        return this.withNewFileData(this.module._ext_ram_file_data_new(this.e), callback);
      }

      loadExtRam(extRamBuffer) {
        this.withNewExtRamFileData((fileDataPtr, buffer) => {
          if (buffer.byteLength !== extRamBuffer.byteLength) return;
          buffer.set(new Uint8Array(extRamBuffer));
          this.module._emulator_read_ext_ram(this.e, fileDataPtr);
        });
      }

      getExtRam() {
        return this.withNewExtRamFileData((fileDataPtr, buffer) => {
          this.module._emulator_write_ext_ram(this.e, fileDataPtr);
          return new Uint8Array(buffer);
        });
      }

      saveBattery() {
        writeArray("extram", this.getExtRam());
      }

      runUntil(untilTicks) {
        while (true) {
          const event = this.module._emulator_run_until_f64(this.e, untilTicks);
          if (event & EVENT_NEW_FRAME) {
            this.video.draw();
          }
          if (event & EVENT_AUDIO_BUFFER_FULL) {
            this.audio.pushBuffer();
          }
          if (event & EVENT_UNTIL_TICKS) {
            break;
          }
        }

        if (this.module._emulator_was_ext_ram_updated(this.e)) {
          this.saveBattery();
        }
      }

      frame(startMs) {
        this.rafToken = requestAnimationFrame(this.frame.bind(this));
        if (paused) return;

        const startSec = startMs / 1000;
        const deltaSec = Math.max(startSec - (this.lastRafSec || startSec), 0);
        const deltaTicks = Math.min(deltaSec, MAX_UPDATE_SEC) * CPU_TICKS_PER_SECOND;
        const runUntilTicks = this.ticks + deltaTicks - this.leftoverTicks;

        this.runUntil(runUntilTicks);
        this.leftoverTicks = (this.ticks - runUntilTicks) | 0;
        this.lastRafSec = startSec;
      }

      start() {
        this.rafToken = requestAnimationFrame(this.frame.bind(this));
      }

      pause() {
        paused = true;
        this.audio.suspend();
      }

      resume() {
        paused = false;
        this.audio.resume();
      }

      togglePause() {
        if (paused) {
          this.resume();
          pauseBtn.textContent = "Pause";
        } else {
          this.pause();
          pauseBtn.textContent = "Resume";
        }
      }

      bindKeys() {
        this.keyFuncs = {
          ArrowDown: this.module._set_joyp_down.bind(null, this.e),
          ArrowLeft: this.module._set_joyp_left.bind(null, this.e),
          ArrowRight: this.module._set_joyp_right.bind(null, this.e),
          ArrowUp: this.module._set_joyp_up.bind(null, this.e),
          KeyZ: this.module._set_joyp_B.bind(null, this.e),
          KeyX: this.module._set_joyp_A.bind(null, this.e),
          Enter: this.module._set_joyp_start.bind(null, this.e),
          Tab: this.module._set_joyp_select.bind(null, this.e),
          Space: (isDown) => { if (isDown) this.togglePause(); },
        };

        this.boundKeyDown = this.keyDown.bind(this);
        this.boundKeyUp = this.keyUp.bind(this);
        window.addEventListener("keydown", this.boundKeyDown);
        window.addEventListener("keyup", this.boundKeyUp);
      }

      keyDown(event) {
        const handler = this.keyFuncs[event.code];
        if (!handler) return;
        handler(true);
        event.preventDefault();
      }

      keyUp(event) {
        const handler = this.keyFuncs[event.code];
        if (!handler) return;
        handler(false);
        event.preventDefault();
      }

      destroy() {
        if (this.rafToken !== null) {
          cancelAnimationFrame(this.rafToken);
          this.rafToken = null;
        }
        window.removeEventListener("keydown", this.boundKeyDown);
        window.removeEventListener("keyup", this.boundKeyUp);
        this.audio.destroy();
        this.module._emulator_delete(this.e);
        this.module._free(this.romDataPtr);
      }
    }

    function updateCanvasSize() {
      if (document.fullscreenElement === screenWrap) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let width = vw;
        let height = Math.floor((width * 144) / 160);
        if (height > vh) {
          height = vh;
          width = Math.floor((height * 160) / 144);
        }
        canvas.style.width = String(width) + "px";
        canvas.style.height = String(height) + "px";
      } else {
        canvas.style.width = String(160 * selectedScale) + "px";
        canvas.style.height = String(144 * selectedScale) + "px";
      }
    }

    function applyScale(scale) {
      selectedScale = scale;
      updateCanvasSize();
      scaleButtons.forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.scale) === scale);
      });
    }

    async function boot() {
      clearCriticalStatus();
      romBuffer = await (await fetch(ROM_PATH)).arrayBuffer();
      const module = await Binjgb();
      const extRam = readArray("extram");
      emu = new Emulator(module, romBuffer, extRam ? extRam.buffer : null);
      emu.setPalette(Number(paletteSelect.value));
      emu.start();
    }

    async function resetEmulator() {
      if (!emu || !romBuffer) return;
      const currentPalette = Number(paletteSelect.value);
      emu.destroy();
      const module = await Binjgb();
      const extRam = readArray("extram");
      emu = new Emulator(module, romBuffer, extRam ? extRam.buffer : null);
      emu.setPalette(currentPalette);
      paused = false;
      pauseBtn.textContent = "Pause";
      emu.start();
    }

    scaleButtons.forEach((btn) => {
      btn.addEventListener("click", () => applyScale(Number(btn.dataset.scale)));
    });

    paletteSelect.addEventListener("change", () => {
      if (emu) emu.setPalette(Number(paletteSelect.value));
    });

    pauseBtn.addEventListener("click", () => {
      if (emu) emu.togglePause();
    });

    fullscreenBtn.addEventListener("click", () => {
      if (document.fullscreenElement) {
        document.exitFullscreen().catch((error) => setCriticalStatus("Fullscreen hatasi: " + error.message));
      } else {
        screenWrap.requestFullscreen().catch((error) => setCriticalStatus("Fullscreen hatasi: " + error.message));
      }
    });

    document.addEventListener("fullscreenchange", () => {
      updateCanvasSize();
    });

    window.addEventListener("resize", () => {
      updateCanvasSize();
    });

    resetBtn.addEventListener("click", () => {
      resetEmulator().catch((error) => setCriticalStatus("Reset hatasi: " + error.message));
    });

    applyScale(DEFAULT_SCALE);
    boot().catch((error) => setCriticalStatus("Hata: " + error.message));
  </script>
</body>
</html>
