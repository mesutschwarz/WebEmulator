<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binjgb</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #111;
      color: #eee;
      font: 13px/1.4 sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(100%, 760px);
    }

    canvas {
      display: block;
      width: 480px;
      height: 432px;
      background: #000;
      image-rendering: pixelated;
    }

    canvas:fullscreen {
      width: min(100vw, calc(100vh * 160 / 144));
      height: min(100vh, calc(100vw * 144 / 160));
      margin: auto;
      outline: none;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      width: min(100%, 720px);
    }

    button {
      font: inherit;
      padding: 4px 8px;
      background: #222;
      color: inherit;
      border: 1px solid #555;
    }

    #palette-panel {
      width: min(100%, 720px);
      margin-top: 10px;
    }

    #palette-toolbar {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    #palette-toggle {
      min-width: 78px;
    }

    #palette-current {
      width: min(220px, 100%);
    }

    #palette-picker {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 8px;
    }

    #palette-picker[hidden] {
      display: none;
    }

    .palette-button {
      padding: 6px;
      border: 1px solid #555;
      background: #1a1a1a;
      cursor: pointer;
    }

    .palette-button[aria-pressed="true"] {
      border-color: #ddd;
      box-shadow: 0 0 0 1px #ddd inset;
    }

    .palette-button-current {
      cursor: default;
    }

    .palette-button-current .palette-row {
      grid-template-columns: repeat(4, 1fr);
    }

    .palette-button-current .palette-row-label {
      display: none;
    }

    .palette-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 8px;
    }

    .palette-title {
      flex: 1;
      min-width: 0;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      color: #ddd;
    }

    .palette-id {
      font-size: 9px;
      line-height: 1;
      color: #8f8f8f;
      letter-spacing: 0.04em;
      flex: none;
    }

    .palette-grid {
      display: grid;
      gap: 3px;
    }

    .palette-row {
      display: grid;
      grid-template-columns: 18px repeat(4, 1fr);
      gap: 2px;
      align-items: center;
    }

    .palette-row-label {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    .palette-cell {
      height: 12px;
      min-width: 0;
    }

    .palette-cell-transparent {
      background-image:
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
        linear-gradient(var(--palette-color), var(--palette-color));
      background-position: 0 0, 4px 4px, 0 0;
      background-size: 8px 8px, 8px 8px, 100% 100%;
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="controls">

      <button type="button" id="pause">Pause</button>

      </div>
      <div id="palette-picker" aria-label="Palette picker" hidden></div>
    </div>
  </div>

      { name: "Nymph GB by Kerri Lake", colors: [["#8CEFA1", "#95AC3F", "#766144", "#37212C"], ["#8CEFA1", "#95AC3F", "#766144", "#37212C"], ["#8CEFA1", "#95AC3F", "#766144", "#37212C"]] },
      { name: "Darkboy4 by Smalls", colors: [["#F3E8E7", "#C3838C", "#8F4D63", "#190B12"], ["#F3E8E7", "#C3838C", "#8F4D63", "#190B12"], ["#F3E8E7", "#C3838C", "#8F4D63", "#190B12"]] },
      { name: "Kid Icarus SGB", colors: [["#F7F7CE", "#508EF7", "#00009E", "#00001E"], ["#F7F7CE", "#508EF7", "#00009E", "#00001E"], ["#F7F7CE", "#508EF7", "#00009E", "#00001E"]] },
      { name: "Easy Greens by GrafxKid", colors: [["#77DDEB", "#00BCA1", "#33880D", "#334300"], ["#77DDEB", "#00BCA1", "#33880D", "#334300"], ["#77DDEB", "#00BCA1", "#33880D", "#334300"]] },
      { name: "Super Mario Land 2 SGB", colors: [["#B6F7EF", "#77A6DF", "#00C611", "#000000"], ["#B6F7EF", "#77A6DF", "#00C611", "#000000"], ["#B6F7EF", "#77A6DF", "#00C611", "#000000"]] },
      { name: "Wish GB by Kerri Lake", colors: [["#FFE58B", "#CF8F60", "#E85075", "#4C2E62"], ["#FFE58B", "#CF8F60", "#E85075", "#4C2E62"], ["#FFE58B", "#CF8F60", "#E85075", "#4C2E62"]] },
      { name: "GB Studio", colors: [["#DEFFEF", "#94D7AD", "#739252", "#423418"], ["#DEFFEF", "#94D7AD", "#739252", "#423418"], ["#DEFFEF", "#94D7AD", "#739252", "#423418"]] }
    ];
    const toCssColor = (packedColor) => `#${packedColor.slice(5, 7)}${packedColor.slice(3, 5)}${packedColor.slice(1, 3)}`;
    for (const palette of PALETTES) {
      palette.colors = palette.colors.map((row) => row.map(toCssColor));
    }
    const KEY_BINDINGS = [
      { code: "ArrowUp", action: "up", setter: "_set_joyp_up" },
      { code: "ArrowDown", action: "down", setter: "_set_joyp_down" },
      { code: "ArrowLeft", action: "left", setter: "_set_joyp_left" },
      { code: "ArrowRight", action: "right", setter: "_set_joyp_right" },
      { code: "KeyZ", action: "B", setter: "_set_joyp_B" },
      { code: "KeyX", action: "A", setter: "_set_joyp_A" },
      { code: "Enter", action: "start", setter: "_set_joyp_start" },
      { code: "Tab", action: "select", setter: "_set_joyp_select" }
    ];
    const GAMEPAD_ACTIONS = ["up", "down", "left", "right", "B", "A", "start", "select"];

    const canvas = document.getElementById("screen");
    const context = canvas.getContext("2d");
    const imageData = context.createImageData(canvas.width, canvas.height);
    const paletteCurrent = document.getElementById("palette-current");
    const palettePicker = document.getElementById("palette-picker");
    const paletteToggle = document.getElementById("palette-toggle");
    const pauseButton = document.getElementById("pause");
    const resetButton = document.getElementById("reset");
    const fullscreenButton = document.getElementById("fullscreen");
    const pressedKeys = new Set();
    const boundKeys = new Set(KEY_BINDINGS.map(({ code }) => code));
    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    const audioContext = AudioContextCtor ? new AudioContextCtor() : null;
    const blankGamepadState = () => ({ up: false, down: false, left: false, right: false, B: false, A: false, start: false, select: false });

    const state = {
      module: null,
      romBytes: null,
      emulator: 0,
      romDataPtr: 0,
      joypad: 0,
      frameBuffer: null,
      audioBuffer: null,
      audioReady: !audioContext,
      audioStartSec: 0,
      activeGamepadIndex: -1,
      gamepadState: blankGamepadState(),
      paletteIndex: DEFAULT_PALETTE,
      palettePickerOpen: false,
      paused: false,
      lastRafSec: 0,
      leftoverTicks: 0,
      rafId: 0
    };

    const setPalettePickerOpen = (open) => {
      state.palettePickerOpen = open;
      palettePicker.hidden = !open;
      paletteToggle.setAttribute("aria-expanded", String(open));
    };

    const createPaletteCard = (palette, index, isCurrent) => {
      const rowLabels = ["BG", "O0", "O1"];
      const button = document.createElement(isCurrent ? "div" : "button");
      if (!isCurrent) {
        button.type = "button";
      }
      button.className = `palette-button${isCurrent ? " palette-button-current" : ""}`;
      button.dataset.palette = String(index);
      button.title = `${index}: ${palette.name}`;

      const topline = document.createElement("div");
      topline.className = "palette-topline";

      const title = document.createElement("span");
      title.className = "palette-title";
      title.textContent = palette.name;
      topline.append(title);

      const paletteId = document.createElement("span");
      paletteId.className = "palette-id";
      paletteId.textContent = `#${index}`;
      topline.append(paletteId);

      const grid = document.createElement("div");
      grid.className = "palette-grid";

      palette.colors.forEach((row, rowIndex) => {
        const rowElement = document.createElement("div");
        rowElement.className = "palette-row";

        const label = document.createElement("span");
        label.className = "palette-row-label";
        label.textContent = rowLabels[rowIndex];
        rowElement.append(label);

        row.forEach((color, colorIndex) => {
          const cell = document.createElement("span");
          cell.className = "palette-cell";
          if (rowIndex > 0 && colorIndex === 0) {
            cell.classList.add("palette-cell-transparent");
            cell.style.setProperty("--palette-color", color);
            cell.title = "Sprite color 0 is transparent in-game";
          } else {
            cell.style.background = color;
          }
          rowElement.append(cell);
        });

        grid.append(rowElement);
      });

      button.append(topline, grid);
      return button;
    };

    const updatePaletteSelectionUI = () => {
      palettePicker.querySelectorAll(".palette-button").forEach((button) => {
        button.setAttribute("aria-pressed", String(Number(button.dataset.palette) === state.paletteIndex));
      });
      paletteCurrent.replaceChildren(createPaletteCard(PALETTES[state.paletteIndex], state.paletteIndex, true));
    };

    const buildPalettePicker = () => {
      PALETTES.forEach((palette, index) => {
        const button = createPaletteCard(palette, index, false);
        button.addEventListener("click", () => {
          state.paletteIndex = index;
          applyPalette();
          updatePaletteSelectionUI();
          setPalettePickerOpen(false);
        });
        palettePicker.append(button);
      });

      updatePaletteSelectionUI();
    };

    paletteToggle.addEventListener("click", () => {
      setPalettePickerOpen(!state.palettePickerOpen);
    });

    const getCurrentGamepad = () => {
      if (typeof navigator.getGamepads !== "function") {
        return null;
      }

      const gamepads = navigator.getGamepads();
      if (state.activeGamepadIndex >= 0) {
        const activeGamepad = gamepads[state.activeGamepadIndex];
        if (activeGamepad && activeGamepad.connected) {
          return activeGamepad;
        }
      }

      for (const gamepad of gamepads) {
        if (gamepad && gamepad.connected) {
          state.activeGamepadIndex = gamepad.index;
          return gamepad;
        }
      }

      state.activeGamepadIndex = -1;
      return null;
    };

    const readGamepadButton = (gamepad, index) => {
      const button = gamepad.buttons[index];
      return Boolean(button) && (button.pressed || button.value > 0.5);
    };

    const pollGamepad = () => {
      const gamepad = getCurrentGamepad();
      if (!gamepad) {
        state.gamepadState = blankGamepadState();
        return;
      }

      let nextGamepadState;

      const isStandardMapping = gamepad.mapping === "standard";
      if (isStandardMapping) {
        nextGamepadState = {
          up: readGamepadButton(gamepad, 12),
          down: readGamepadButton(gamepad, 13),
          left: readGamepadButton(gamepad, 14),
          right: readGamepadButton(gamepad, 15),
          B: readGamepadButton(gamepad, 0),
          A: readGamepadButton(gamepad, 1),
          start: readGamepadButton(gamepad, 9),
          select: readGamepadButton(gamepad, 8)
        };
      } else {
        const axisX = gamepad.axes[0] || 0;
        const axisY = gamepad.axes[1] || 0;
        nextGamepadState = {
          up: axisY < -GAMEPAD_DEADZONE,
          down: axisY > GAMEPAD_DEADZONE,
          left: axisX < -GAMEPAD_DEADZONE,
          right: axisX > GAMEPAD_DEADZONE,
          A: readGamepadButton(gamepad, 0),
          B: readGamepadButton(gamepad, 1),
          select: readGamepadButton(gamepad, 2),
          start: readGamepadButton(gamepad, 3)
        };
      }

      state.gamepadState = nextGamepadState;
      if (!state.audioReady && audioContext && Object.values(nextGamepadState).some(Boolean)) {
        state.audioReady = true;
        audioContext.resume();
      }
    };

    const syncInput = () => {
      if (!state.emulator) {
        return;
      }
      for (const { code, action, setter } of KEY_BINDINGS) {
        state.module[setter](state.emulator, pressedKeys.has(code) || state.gamepadState[action]);
      }
    };

    const releaseKeyboardInput = () => {
      pressedKeys.clear();
      syncInput();
    };

    const applyPalette = () => {
      if (state.emulator) {
        state.module._emulator_set_builtin_palette(state.emulator, state.paletteIndex);
      }
    };

    const destroyEmulator = () => {
      if (!state.module || !state.emulator) {
        return;
      }
      if (state.joypad) {
        state.module._joypad_delete(state.joypad);
      }
      state.module._emulator_delete(state.emulator);
      state.module._free(state.romDataPtr);
      state.emulator = 0;
      state.romDataPtr = 0;
      state.joypad = 0;
      state.frameBuffer = null;
      state.audioBuffer = null;
      state.lastRafSec = 0;
      state.leftoverTicks = 0;
      state.audioStartSec = 0;
      state.activeGamepadIndex = -1;
      state.gamepadState = blankGamepadState();
      releaseKeyboardInput();
    };

    const createEmulator = () => {
      destroyEmulator();

      const romSize = (state.romBytes.byteLength + 0x7fff) & ~0x7fff;
      state.romDataPtr = state.module._malloc(romSize);
      const romData = new Uint8Array(state.module.HEAP8.buffer, state.romDataPtr, romSize);
      romData.fill(0);
      romData.set(state.romBytes);

      state.emulator = state.module._emulator_new_simple(
        state.romDataPtr,
        romSize,
        audioContext ? audioContext.sampleRate : 48000,
        AUDIO_FRAMES,
        2
      );
      if (state.emulator === 0) {
        throw new Error("Invalid ROM");
      }

      state.joypad = state.module._joypad_new();
      state.module._emulator_set_default_joypad_callback(state.emulator, state.joypad);
      state.frameBuffer = new Uint8Array(
        state.module.HEAP8.buffer,
        state.module._get_frame_buffer_ptr(state.emulator),
        state.module._get_frame_buffer_size(state.emulator)
      );
      state.audioBuffer = new Uint8Array(
        state.module.HEAP8.buffer,
        state.module._get_audio_buffer_ptr(state.emulator),
        state.module._get_audio_buffer_capacity(state.emulator)
      );
      applyPalette();
      pollGamepad();
      syncInput();
      updatePaletteSelectionUI();
    };

    const queueAudio = () => {
      if (!audioContext || !state.audioReady) {
        return;
      }

      const nowSec = audioContext.currentTime;
      state.audioStartSec = Math.max(state.audioStartSec || nowSec + AUDIO_LATENCY_SEC, nowSec + AUDIO_LATENCY_SEC);

      const buffer = audioContext.createBuffer(2, AUDIO_FRAMES, audioContext.sampleRate);
      const left = buffer.getChannelData(0);
      const right = buffer.getChannelData(1);
      for (let index = 0; index < AUDIO_FRAMES; index += 1) {
        left[index] = state.audioBuffer[index * 2] / 255;
        right[index] = state.audioBuffer[index * 2 + 1] / 255;
      }

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start(state.audioStartSec);
      state.audioStartSec += AUDIO_FRAMES / audioContext.sampleRate;
    };

    const frame = (startMs) => {
      state.rafId = requestAnimationFrame(frame);
      pollGamepad();
      syncInput();
      if (!state.emulator || state.paused) {
        return;
      }

      const startSec = startMs / 1000;
      const deltaTicks = Math.min(
        Math.max(startSec - (state.lastRafSec || startSec), 0),
        MAX_UPDATE_SEC
      ) * CPU_TICKS_PER_SECOND;
      const targetTicks = state.module._emulator_get_ticks_f64(state.emulator) + deltaTicks - state.leftoverTicks;

      while (true) {
        const event = state.module._emulator_run_until_f64(state.emulator, targetTicks);
        if (event & EVENT_NEW_FRAME) {
          imageData.data.set(state.frameBuffer);
          context.putImageData(imageData, 0, 0);
        }
        if (event & EVENT_AUDIO_BUFFER_FULL) {
          queueAudio();
        }
        if (event & EVENT_UNTIL_TICKS) {
          break;
        }
      }

      state.leftoverTicks = (state.module._emulator_get_ticks_f64(state.emulator) - targetTicks) | 0;
      state.lastRafSec = startSec;
    };

    const setScale = (scale) => {
      canvas.style.width = `${canvas.width * scale}px`;
      canvas.style.height = `${canvas.height * scale}px`;
    };

    pauseButton.addEventListener("click", () => {
      state.paused = !state.paused;
      state.lastRafSec = 0;
      state.leftoverTicks = 0;
      state.audioStartSec = 0;
      pauseButton.textContent = state.paused ? "Resume" : "Pause";
      if (audioContext) {
        if (state.paused) {
          audioContext.suspend();
        } else if (state.audioReady) {
          audioContext.resume();
        }
      }
    });

    resetButton.addEventListener("click", () => {
      state.paused = false;
      pauseButton.textContent = "Pause";
      state.audioStartSec = 0;
      createEmulator();
      if (audioContext && state.audioReady) {
        audioContext.resume();
      }
    });

    const updateFullscreenButton = () => {
      fullscreenButton.textContent = document.fullscreenElement === canvas ? "Exit Fullscreen" : "Fullscreen";
    };

    fullscreenButton.addEventListener("click", async () => {
      if (document.fullscreenElement === canvas) {
        await document.exitFullscreen();
      } else {
        await canvas.requestFullscreen();
      }
    });

    document.addEventListener("fullscreenchange", updateFullscreenButton);

    document.querySelectorAll("button[data-scale]").forEach((button) => {
      button.addEventListener("click", () => {
        setScale(Number(button.dataset.scale));
      });
    });

    window.addEventListener("keydown", (event) => {
      if (!boundKeys.has(event.code)) {
        return;
      }

      event.preventDefault();
      pressedKeys.add(event.code);
      syncInput();
      if (!state.audioReady && audioContext) {
        state.audioReady = true;
        audioContext.resume();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (!boundKeys.has(event.code)) {
        return;
      }

      event.preventDefault();
      pressedKeys.delete(event.code);
      syncInput();
    });

    window.addEventListener("blur", releaseKeyboardInput);

    window.addEventListener("gamepadconnected", (event) => {
      state.activeGamepadIndex = event.gamepad.index;
      pollGamepad();
      syncInput();
    });

    window.addEventListener("gamepaddisconnected", (event) => {
      if (event.gamepad.index === state.activeGamepadIndex) {
        state.activeGamepadIndex = -1;
      }
      pollGamepad();
      syncInput();
    });

    (async () => {
      state.module = await Binjgb();
      const response = await fetch("gameboy.gb");
      if (!response.ok) {
        throw new Error("Unable to load gameboy.gb");
      }

      state.romBytes = new Uint8Array(await response.arrayBuffer());
      buildPalettePicker();
      createEmulator();
      setScale(3);
      updateFullscreenButton();
      state.rafId = requestAnimationFrame(frame);
    })().catch((error) => {
      console.error(error);
      document.body.textContent = error.message;
    });
  </script>
</body>
</html>
