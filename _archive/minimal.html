<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="launcher.css" />
  <title>binjgb / Minimal</title>
</head>
<body class="theme-minimal">
  <script>
    window.BINJGB_LAUNCHER_CONFIG = {
      title: "binjgb / Minimal",
      subtitle: "Fast start, no extra panels, only the fixed ROM.",
      rom: "gameboy.gb",
      storagePrefix: "binjgb:minimal",
      showTouchControls: false,
      showAdvancedControls: false,
      enableFastForward: false,
      enableRewind: false,
      enablePause: false,
      enablePaletteSwitching: false,
      enableSaveState: false,
      enableLoadState: false,
      enableFullscreen: true,
      enableReset: false,
      enableCurveChange: false,
      autoLoadState: false,
      cgbColorCurve: 0,
      defaultPaletteIdx: 0,
      palettes: [79],
    };
  </script>
  <main class="app">
    <section class="hero">
      <div class="eyebrow">static launcher</div>
      <h1>Minimal</h1>
      <p id="subtitleLabel"></p>
    </section>

    <section class="workspace">
      <section class="screenFrame">
        <div class="screenShell">
          <canvas id="screen" width="160" height="144">No Canvas Support</canvas>
          <div id="bootMessage" class="bootMessage">Booting emulator...</div>
        </div>
      </section>

      <aside class="panel">
        <section class="panelSection">
          <h2 class="panelTitle">Live State</h2>
          <div class="stats">
            <div class="stat"><span>FPS</span><strong id="fpsLabel">60.0</strong></div>
            <div class="stat"><span>Ticks</span><strong id="ticksLabel">0</strong></div>
            <div class="stat"><span>Mode</span><strong id="modeLabel">running</strong></div>
            <div class="stat"><span>Palette</span><strong id="paletteLabel">0</strong></div>
          </div>
        </section>

        <section class="panelSection">
          <h2 class="panelTitle">Controls</h2>
          <div class="buttonRow">
            <button data-action="fullscreen">Fullscreen</button>
          </div>
        </section>

        <section class="panelSection">
          <h2 class="panelTitle">Info</h2>
          <div class="hint">Keyboard only: <code>Arrow keys</code>, <code>Z/X</code>, <code>Enter</code>, <code>Tab</code>. This page keeps the chrome intentionally small.</div>
        </section>
      </aside>
    </section>

    <section class="footerBar">
      <div class="chips">
        <span class="chip"><b>ROM</b> gameboy.gb</span>
        <span class="chip"><b>Touch</b> off</span>
      </div>
      <div class="chips">
        <span class="chip">Fast path</span>
      </div>
    </section>
  </main>

  <section id="controller" class="touchController" data-feature="touch">
    <div id="controller_dpad">
      <div id="controller_left"></div>
      <div id="controller_right"></div>
      <div id="controller_up"></div>
      <div id="controller_down"></div>
    </div>
    <div id="controller_select" class="capsuleBtn">Select</div>
    <div id="controller_start" class="capsuleBtn">Start</div>
    <div id="controller_b" class="roundBtn">B</div>
    <div id="controller_a" class="roundBtn">A</div>
  </section>

  <script src="binjgb.js"></script>
  <script src="launcher-core.js"></script>
</body>
</html>
